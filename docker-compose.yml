version: '3.9'
services:
  backend:
    build:
      context: ./backend
    container_name: expense-backend
    environment:
      - ENV=production
    ports:
      - "8000:8000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
  frontend:
    build:
      context: ./frontend
    container_name: expense-frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://expense-backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 60s
      timeout: 5s
      retries: 3
networks:
  app-net:
    driver: bridge
